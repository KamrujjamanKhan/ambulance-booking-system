<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin Dashboard - AmbulanceHub Management System">
  <title>Admin Dashboard - AmbulanceHub</title>
  
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ============================================
       NAVBAR
       ============================================ -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-with-gaps">
      <a class="navbar-brand" href="index.html">
        <span class="navbar-logo-icon">
          <i class="fas fa-ambulance"></i>
        </span>
        AmbulanceHub Admin
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <span class="nav-link">Admin Panel</span>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="logout(); return false;">Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ============================================
       DASHBOARD CONTAINER
       ============================================ -->
  <div class="dashboard-container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        Admin Panel
      </div>
      <ul class="sidebar-menu">
        <li>
          <a href="#dashboard" class="active">
            <i class="fas fa-chart-line"></i>
            Dashboard
          </a>
        </li>
        <li>
          <a href="#users">
            <i class="fas fa-users"></i>
            Manage Users
          </a>
        </li>
        <li>
          <a href="#drivers">
            <i class="fas fa-id-card"></i>
            Manage Drivers
          </a>
        </li>
        <li>
          <a href="#ambulances">
            <i class="fas fa-ambulance"></i>
            Manage Ambulances
          </a>
        </li>
        <li>
          <a href="#bookings">
            <i class="fas fa-list"></i>
            All Bookings
          </a>
        </li>
        <li>
          <a href="#reports">
            <i class="fas fa-file-alt"></i>
            Reports
          </a>
        </li>
        <li>
          <a href="#" onclick="logout(); return false;">
            <i class="fas fa-sign-out-alt"></i>
            Logout
          </a>
        </li>
      </ul>
    </aside>

    <!-- MAIN CONTENT REMOVED: Admin sidebar only view -->
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Font Awesome -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <!-- Custom JS -->
  <script src="js/script.js"></script>
</body>
</html>
